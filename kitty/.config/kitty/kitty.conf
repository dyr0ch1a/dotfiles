# ═══════════════════════════════════════════════════════════════
# Расширенная палитра Kitty — Кибер-розовая
# ═══════════════════════════════════════════════════════════════
# --- ШРИФТ ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0
# --- ПРОЗРАЧНОСТЬ ---
background_opacity         0.75
dynamic_background_opacity no
# --- ОСНОВНЫЕ ЦВЕТА ---
background        #0A0A0A
foreground        #F7C6D9
cursor            #FF4FA3
cursor_text_color #0A0A0A
selection_background #6A0D45
selection_foreground #F7C6D9
# --- БАЗОВАЯ ПАЛИТРА (0-15) ---
# Чёрный
color0  #0A0A0A
# Ярко-розовый (красный → ошибки)
color1  #FF4FA3
# Электрическая фуксия (зелёный → успех)
color2  #D9007E
# Золотисто-розовый (жёлтый → предупреждения) ← было #F7C6D9
color3  #FF9EC4
# Тёмный пурпур (синий → директории)
color4  #6A0D45
# Металлический серебристый (пурпур → спецсимволы)
color5  #BFBFBF
# Неоновый розовый (голубой → ссылки)
color6  #FF007F
# Светло-серый (белый → обычный текст) ← было #F7C6D9
color7  #D4D4D4
# Графит (яркий чёрный → комментарии)
color8  #2E2E2E
# Яркий красный
color9  #FF4FA3
# Яркий зелёный → фуксия насыщеннее ← было #D9007E
color10 #FF2D9B
# Яркий жёлтый → персиково-розовый ← было #F7C6D9
color11 #FFB3D1
# Яркий синий → лаванда ← было #6A0D45
color12 #9B59B6
# Яркий пурпур
color13 #BFBFBF
# Яркий голубой
color14 #FF007F
# Яркий белый
color15 #FFFFFF
# --- ДОПОЛНИТЕЛЬНЫЕ 16 ЦВЕТОВ (16-31) ---
color16 #330033
color17 #660066
color18 #990099
color19 #CC00CC
color20 #FF33FF
color21 #FF66FF
color22 #FF99FF
color23 #FFCCFF
color24 #660033
color25 #993366
color26 #CC6699
color27 #FF99CC
color28 #FF66CC
color29 #FF33CC
color30 #FF00CC
color31 #FF0099
# --- ДОПОЛНИТЕЛЬНО ---
url_color #FF4FA3
url_style curly
# --- НАСТРОЙКИ ОКНА ---
window_padding_width 4
confirm_os_window_close 0
enable_audio_bell no
# --- ПРОИЗВОДИТЕЛЬНОСТЬ ---
repaint_delay 10
input_delay 3
sync_to_monitor yes
